name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  RunMake:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make dpkg-dev

      - name: Build program
        working-directory: ./src
        run: |
          make build
          mkdir -p ../usr/bin
          cp max_value ../usr/bin/
          chmod +x ../usr/bin/max_value

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-program
          path: usr/bin/max_value


  RunTest:
    needs: RunMake
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download built program
        uses: actions/download-artifact@v4
        with:
          name: built-program
          path: ./usr/bin

      - name: Run tests
        run: |
          chmod +x ./usr/bin/max_value

          echo "=== RUN TESTS ==="
          bash cicd/tests/test1.sh
          bash cicd/tests/test2.sh
          bash cicd/tests/test3.sh
          echo "=== ALL TESTS DONE ==="


  RunPackage:
    needs: RunTest
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: built-program
          path: ./usr/bin

      - name: Build .deb package
        run: |
          mkdir -p build/max-value_1.0/DEBIAN
          mkdir -p build/max-value_1.0/usr/bin

          cp DEBIAN/control build/max-value_1.0/DEBIAN/
          cp usr/bin/max_value build/max-value_1.0/usr/bin/

          dpkg-deb --build build/max-value_1.0 max_value.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: max_value.deb
          retention-days: 1


  test-docker:
    needs: RunMake
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .

      - name: Build Docker image
        run: docker build -t myapp-test .

      - name: Build Docker image with tag
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

          docker tag ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      - name: Save Docker image to dist folder (local artifact)
        run: |
          mkdir -p dist
          docker save myapp-test -o dist/myapp-container.tar
          gzip -f dist/myapp-container.tar

          echo "Local artifact created:"
          ls -la dist/

      - name: Upload container artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: dist/myapp-container.tar.gz
          retention-days: 1
