name: CI Pipeline - C++ Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  RunMake:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make dpkg-dev

      - name: Build program
        run: |
          cd src
          make build
          mkdir -p ../usr/bin
          cp max_value ../usr/bin/
          chmod +x ../usr/bin/max_value

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-program
          path: usr/bin/max_value
          retention-days: 1

  RunTest:
    needs: RunMake
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: built-program
          path: ./usr/bin

      - run: chmod +x ./usr/bin/max_value

      - name: Run tests
      run: |
        echo "=== RUN TESTS ==="

        bash cicd/tests/test1.sh
        bash cicd/tests/test2.sh
        bash cicd/tests/test3.sh

        echo "=== ALL TESTS DONE ==="

  RunPackage:
    needs: RunTest
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: built-program
          path: ./usr/bin

      - name: Build .deb package
        run: |
          mkdir -p build/max-value_1.0/DEBIAN
          mkdir -p build/max-value_1.0/usr/bin

          cp DEBIAN/control build/max-value_1.0/DEBIAN/
          cp usr/bin/max_value build/max-value_1.0/usr/bin/

          dpkg-deb --build build/max-value_1.0

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/max-value_1.0.deb
          retention-days: 1
